{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Registro de Paciente</title>
</head>

<body class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">
            <img src="{% static 'logo.png' %}" alt="Logo Clínica" width="400" class="mb-5 border-0">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">

                    <h4 class="mb-0">Registro nuevo paciente</h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        {{ form.as_p }}

                        <div class="d-flex justify-content-between mt-4">
                            <a href="{% url 'lista_pacientes' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-success">Guardar Paciente</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
